name: CI Test Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  code-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Initial Message
        run: echo "Starting CI/CD pipeline."

      - name: Displaying build VM details
        run: |
          echo "This is a VM with OS:"
          uname -a
          echo "Is Docker available?"
          docker --version
