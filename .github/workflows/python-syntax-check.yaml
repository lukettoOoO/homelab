name: python-syntax-check-linter

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cclauss/Find-Python-syntax-errors-action@master
          
  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t monitor-app:latest -f Learning/Docker/Docker/Containerization/http-monitor/dockerfile Learning/Docker/Docker/Containerization/http-monitor
      
    
